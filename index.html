<!DOCTYPE html>
<html>
<head>
<title>ORION-X | Interplanetary Command</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:#00ffcc;
font-family:monospace;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:#000000aa;
padding:15px;
border:1px solid #00ffcc;
border-radius:10px;
}

#success{
display:none;
position:fixed;
width:100%;
height:100%;
background:black;
text-align:center;
padding-top:20%;
font-size:40px;
animation:fadeIn 3s forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>
<body>

<div id="hud">
Mission Phase: <span id="phase">Launch</span><br>
Distance Travelled: <span id="distance">0</span> million km
</div>

<div id="success">
🔴 MARS ORBIT INSERTION COMPLETE<br><br>
🚀 INTERPLANETARY MISSION SUCCESSFUL<br><br>
🛰 Welcome to Mars
</div>

<script>
/* SCENE */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* STARFIELD */
const starGeometry = new THREE.BufferGeometry();
const starCount = 8000;
const positions = new Float32Array(starCount*3);

for(let i=0;i<starCount*3;i++){
positions[i]=(Math.random()-0.5)*4000;
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
const starMaterial = new THREE.PointsMaterial({color:0xffffff});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

/* EARTH */
const earth = new THREE.Mesh(
new THREE.SphereGeometry(20,32,32),
new THREE.MeshBasicMaterial({color:0x0033ff})
);
earth.position.x = -300;
scene.add(earth);

/* MARS */
const mars = new THREE.Mesh(
new THREE.SphereGeometry(15,32,32),
new THREE.MeshBasicMaterial({color:0xaa3300})
);
mars.position.x = 300;
scene.add(mars);

/* ROCKET */
const rocket = new THREE.Mesh(
new THREE.CylinderGeometry(2,2,20,32),
new THREE.MeshBasicMaterial({color:0xffffff})
);
rocket.rotation.z = Math.PI/2;
rocket.position.x = -300;
scene.add(rocket);

camera.position.z = 200;

/* TRAJECTORY ARC */
const curve = new THREE.QuadraticBezierCurve3(
new THREE.Vector3(-300,0,0),
new THREE.Vector3(0,200,0),
new THREE.Vector3(300,0,0)
);

const points = curve.getPoints(100);
const curveGeometry = new THREE.BufferGeometry().setFromPoints(points);
const curveMaterial = new THREE.LineBasicMaterial({color:0x00ffcc});
const trajectory = new THREE.Line(curveGeometry, curveMaterial);
scene.add(trajectory);

/* ANIMATION */
let progress = 0;

function animate(){
requestAnimationFrame(animate);

earth.rotation.y += 0.002;
mars.rotation.y += 0.002;
stars.rotation.y += 0.0005;

if(progress < 1){
progress += 0.0008;
const position = curve.getPoint(progress);
rocket.position.copy(position);

document.getElementById("distance").innerText =
(Math.floor(progress*225)).toString();

if(progress < 0.3){
document.getElementById("phase").innerText = "Leaving Earth Orbit";
}
else if(progress < 0.7){
document.getElementById("phase").innerText = "Deep Space Cruise";
}
else{
document.getElementById("phase").innerText = "Mars Approach";
}
}
else{
document.getElementById("phase").innerText = "Mars Orbit Insertion";
document.getElementById("success").style.display="block";
}

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
